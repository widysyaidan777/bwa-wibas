<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
/* ================= SUBMENU ================= */
function toggleSubmenu(region){
  const el=document.getElementById('submenu-'+region);
  el.style.display = el.style.display==='block' ? 'none':'block';
}

/* ================= MAP ================= */
const map = L.map('map').setView([-6.9,110.5],5);

/* ===== GOOGLE SATELLITE ONLY ===== */
const googleSat = L.tileLayer(
  'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
  {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
  }
);

/* ===== GOOGLE HYBRID (Satellite + Jalan) ===== */
const googleHybrid = L.tileLayer(
  'https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
  {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
  }
);

/* ===== OSM (Cadangan) ===== */
const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

/* Default Map */
googleHybrid.addTo(map);

/* Layer Control */
L.control.layers(
  {
    "Hybrid (Satellite + Jalan)": googleHybrid,
    "Satellite Only": googleSat,
    "OSM Map": osm
  },
  null,
  { position: 'topright' }
).addTo(map);
/* ================= RULER (FINAL BENAR) ================= */
let rulerActive=false;
let rulerPoints=[]; let rulerLine=null; let rulerMarkers=[]; let rulerLabel=null;

function activateRuler(){ resetRuler(); rulerActive=true; map.getContainer().style.cursor='crosshair'; }
function resetRuler(){ rulerActive=false; rulerPoints=[]; if(rulerLine) map.removeLayer(rulerLine); rulerMarkers.forEach(m=>map.removeLayer(m)); if(rulerLabel) map.removeLayer(rulerLabel); rulerLine=null; rulerMarkers=[]; rulerLabel=null; map.getContainer().style.cursor=''; }
function calculateAzimuth(p1,p2){ const lat1=p1.lat*Math.PI/180; const lat2=p2.lat*Math.PI/180; const dLon=(p2.lng-p1.lng)*Math.PI/180; const y=Math.sin(dLon)*Math.cos(lat2); const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon); return (Math.atan2(y,x)*180/Math.PI+360)%360; }
function addRulerPoint(latlng){
  if(rulerPoints.length>=2) return;
  rulerPoints.push(latlng);
  const m=L.marker(latlng,{draggable:true,icon:L.divIcon({className:'',iconSize:[12,12],html:'<div style="width:12px;height:12px;border-radius:50%;background:#facc15"></div>'})}).addTo(map);
  m.on('drag',()=>{ rulerPoints[rulerMarkers.indexOf(m)]=m.getLatLng(); rulerLine.setLatLngs(rulerPoints); const d=map.distance(rulerPoints[0],rulerPoints[1])/1000; const az=calculateAzimuth(rulerPoints[0],rulerPoints[1]); const mid=[(rulerPoints[0].lat+rulerPoints[1].lat)/2,(rulerPoints[0].lng+rulerPoints[1].lng)/2]; rulerLabel.setLatLng(mid).setContent(`<b>${d.toFixed(2)} km<br>Azimuth: ${az.toFixed(1)}°</b>`); });
  rulerMarkers.push(m);
  if(rulerPoints.length===2){
    rulerLine=L.polyline(rulerPoints,{color:'#facc15',weight:3}).addTo(map);
    const d=map.distance(rulerPoints[0],rulerPoints[1])/1000;
    const az=calculateAzimuth(rulerPoints[0],rulerPoints[1]);
    const mid=[(rulerPoints[0].lat+rulerPoints[1].lat)/2,(rulerPoints[0].lng+rulerPoints[1].lng)/2];
    rulerLabel=L.tooltip({permanent:true,direction:'center',className:'ruler-label'}).setLatLng(mid).setContent(`<b>${d.toFixed(2)} km<br>Azimuth: ${az.toFixed(1)}°</b>`).addTo(map);
    rulerActive=false; map.getContainer().style.cursor='';
  }
}
map.on('click',e=>{if(rulerActive) addRulerPoint(e.latlng);});

/* ================= NODE ICON ================= */
function icon(colors, azimuth=0, isDown=false){

  return L.divIcon({
    className: isDown ? 'node-blink fast' : '',  // 🔥 hanya blink kalau DOWN
    iconSize:[36,36],
    iconAnchor:[18,18],
    html:`
    <div style="transform: rotate(${azimuth - 90}deg);">
      <svg width="36" height="36" viewBox="0 0 100 100">
        <path d="M50 50 L50 0 A50 50 0 0 1 100 50 Z" fill="${colors[0]}"/>
        <path d="M50 50 L100 50 A50 50 0 0 1 50 100 Z" fill="${colors[1]}"/>
        <path d="M50 50 L50 100 A50 50 0 0 1 0 50 Z" fill="${colors[2]}"/>
        <path d="M50 50 L0 50 A50 50 0 0 1 50 0 Z" fill="${colors[3]}"/>
        <circle cx="50" cy="50" r="9" fill="#020617" stroke="white" stroke-width="2"/>
      </svg>
    </div>
    `
  });
}
/* ================= SECTOR ================= */
function createSector(center, radius, startAz, endAz, opt){

  const pts = [center];

  // normalisasi
  startAz = ((startAz % 360) + 360) % 360;
  endAz   = ((endAz % 360) + 360) % 360;

  let az = startAz;

  while(true){

    const rad = az * Math.PI / 180;

    const lat = center.lat + (radius * Math.cos(rad)) / 111320;
    const lng = center.lng + (radius * Math.sin(rad)) /
      (111320 * Math.cos(center.lat * Math.PI / 180));

    pts.push([lat, lng]);

    if(az === endAz) break;

    az = (az + 2) % 360;   // 🔥 WRAP OTOMATIS
  }

  pts.push(center);

  return L.polygon(pts, opt);
}

let nodes = [];
let coverageVisible=true;

  function calculateNodeCapacity(nodeName){
  return usersData
    .filter(u =>
      (u.nodeName || "").trim().toUpperCase() === nodeName.trim().toUpperCase()
    )
    .reduce((total, u) => total + (u.bandwidth || 0), 0);
}

function formatBandwidth(raw){

  if(!raw) return "0 Kbps";

  // 🔥 ambil angka saja (handle: "01 Mbps", "1024 Kbps", dll)
  let num = parseInt(String(raw).replace(/[^\d]/g, ""));

  if(isNaN(num) || num <= 0) return "0 Kbps";

  // 🔥 jika >= 1024 → convert ke Mbps
  if(num >= 1024){
    const mbps = num / 1024;

    // 🔥 bulat → tanpa desimal
    if(Number.isInteger(mbps)){
      return `${mbps} Mbps`;
    }

    return `${mbps.toFixed(1)} Mbps`;
  }

  // 🔥 kalau masih Kbps
  return `${num} Kbps`;
}

/* ================= TABLE & FILTER ================= */
function render(list){

  const tb = document.getElementById("nodeTableBody");
  tb.innerHTML = "";

 list
.sort((a,b)=> a.name.localeCompare(b.name)) // 🔥 SORT A-Z
.forEach(n=>{

    const tr = document.createElement("tr");
    tr.dataset.node = n.name;

  const capacity = calculateNodeCapacity(n.name);
  
  tr.innerHTML = `
    <td style="cursor:pointer">▶ ${n.name}</td>
    <td>${n.region}</td>
    <td class="${n.status==="UP"?"up":"down"}">${n.status}</td>
    <td>${formatBandwidth(capacity)}</td>
  `;

    tr.onclick = ()=>{
      focusNode(n.name);      // 🔥 zoom ke node tetap jalan
      toggleNodeUsers(n.name);
    };

    tb.appendChild(tr);

  });

}
  function renderNodeTable(){
  const tb = document.getElementById("nodeTableBody");
  tb.innerHTML = "";

  nodes.forEach(n => {
    const tr = document.createElement("tr");
    tr.dataset.node = n.name;

    const capacity = calculateNodeCapacity(n.name);

    tr.innerHTML = `
      <td style="cursor:pointer">▶ ${n.name}</td>
      <td>${n.region}</td>
      <td class="${n.status==="UP"?"up":"down"}">${n.status}</td>
      <td>${formatBandwidth(capacity)}</td>
    `;
    tr.onclick = () => {
      focusNode(n.name);      // zoom ke node
      toggleNodeUsers(n.name);
    };

    tb.appendChild(tr);
  });
}function toggleNodeUsers(nodeName){

  const tb = document.getElementById("nodeTableBody");
  const nodeRow = tb.querySelector(`tr[data-node="${nodeName}"]`);
  if(!nodeRow) return;

  // =============================
  // COLLAPSE JIKA SUDAH TERBUKA
  // =============================
  const next = nodeRow.nextElementSibling;
  if(next && next.dataset.parent === nodeName){
    let row = next;
    while(row && row.dataset.parent === nodeName){
      const temp = row.nextElementSibling;
      row.remove();
      row = temp;
    }
    nodeRow.children[0].innerHTML = "▶ " + nodeName;
    return;
  }

  nodeRow.children[0].innerHTML = "▼ " + nodeName;

  const users = usersData.filter(u =>
    (u.nodeName || "").trim().toUpperCase() === nodeName.trim().toUpperCase()
  );

  // =============================
  // GROUP USER BY SECTOR
  // =============================
  const sectorMap = {};

  users.forEach(u => {
    const sector = (u.sectorName || "-").toUpperCase();

    if(!sectorMap[sector]){
      sectorMap[sector] = [];
    }

    sectorMap[sector].push(u);
  });

  // 🔥 HANYA AMBIL SECTOR YANG ADA USER
  const activeSectors = Object.keys(sectorMap);

  let insertAfter = nodeRow;

  activeSectors.forEach(sectorName => {

    const sectorUsers = sectorMap[sectorName];

    // =============================
    // HEADER SECTOR
    // =============================
    const trSector = document.createElement("tr");
    trSector.dataset.parent = nodeName;

    trSector.innerHTML = `
      <td colspan="4" style="
        padding-left:30px;
        font-weight:bold;
        color:#facc15;
      ">
      📡 ${sectorName} (${sectorUsers.length} user)
      </td>
    `;

    insertAfter.after(trSector);
    insertAfter = trSector;

    // =============================
    // LIST USER
    // =============================
    sectorUsers.forEach(u => {

      const trUser = document.createElement("tr");
      trUser.dataset.parent = nodeName;

      trUser.innerHTML = `
        <td colspan="4" style="
          padding-left:50px;
          color:#9fdcff
        ">
        👤 ${u.name}<br>
        Bandwidth: ${formatBandwidth(u.bandwidth || 0)}<br>
        Status: ${u.status || "UP"}
        </td>
      `;

      trUser.onclick = () => {
        map.flyTo([u.lat, u.lng], 14);
      };

      insertAfter.after(trUser);
      insertAfter = trUser;
    });

  });

  // =============================
  // JIKA BENAR-BENAR TIDAK ADA USER
  // =============================
  if(activeSectors.length === 0){

    const trEmpty = document.createElement("tr");
    trEmpty.dataset.parent = nodeName;

    trEmpty.innerHTML = `
      <td colspan="4" style="
        padding-left:30px;
        color:#94a3b8;
        font-style:italic;
      ">
      Tidak ada user di node ini
      </td>
    `;

    insertAfter.after(trEmpty);
  }
}
  function renderSearchResult(node){

const tb = document.getElementById("nodeTableBody");

tb.innerHTML = "";

/* tampilkan node */

const tr = document.createElement("tr");

const capacity = calculateNodeCapacity(node.name);

tr.innerHTML = `
<td>${node.name}</td>
<td>${node.region}</td>
<td class="${node.status==="UP"?"up":"down"}">${node.status}</td>
<td>${formatBandwidth(capacity)}</td>
`;
tb.appendChild(tr);


/* cari user yang ada di node ini */

const users = usersData.filter(u =>
  (u.nodeName || "")
  .trim()
  .toUpperCase() ===
  (node.name || "")
  .trim()
  .toUpperCase()
);


/* tampilkan user */

users.forEach(u=>{

const trUser = document.createElement("tr");

trUser.innerHTML = `
<td colspan="3" style="padding-left:40px;color:#9fdcff">
${u.name}<br>
Bandwidth: ${formatBandwidth(u.bandwidth || 0)}<br>
Node: ${u.nodeName}<br>
Sector: ${u.sectorName || u.sector || "-"}<br>
Status: ${u.status || "UP"}
</td>
`;

tb.appendChild(trUser);

});

}
function focusNode(name){ const n=nodes.find(x=>x.name===name); map.flyTo([n.lat,n.lng],11,{animate:true,duration:1.2}); n.marker.openPopup(); }
function showAll(){ render(nodes); nodes.forEach(n=>{ n.marker.addTo(map); n.sectors.forEach(s=>coverageVisible&&s.addTo(map)); }); }
function filterRegion(r){ render(nodes.filter(n=>n.region===r)); nodes.forEach(n=>{ if(n.region===r){ n.marker.addTo(map); n.sectors.forEach(s=>coverageVisible&&s.addTo(map)); }else{ map.removeLayer(n.marker); n.sectors.forEach(s=>map.removeLayer(s)); } }); }
function toggleCoverage(){ coverageVisible=!coverageVisible; nodes.forEach(n=>n.sectors.forEach(s=>{ coverageVisible?s.addTo(map):map.removeLayer(s); })); }
function toggleNodeCoverage(nodeName){

const node = nodes.find(n=>n.name===nodeName);

if(!node) return;

node.coverageOn = !node.coverageOn;

node.sectors.forEach(s=>{

if(node.coverageOn && coverageVisible){
s.addTo(map);
}else{
map.removeLayer(s);
}

});

}
  
function toggleTable(){ document.getElementById('node-section').classList.toggle('hidden'); }
function searchTopology(){

  const keyword = document
  .getElementById("searchBox")
  .value
  .trim()
  .toUpperCase();

  if(!keyword){
    showAll();
    return;
  }

  /* SEARCH NODE */

  const node = nodes.find(n =>
    n.name.toUpperCase().includes(keyword)
  );

  if(node){

    /* sembunyikan node lain */
    nodes.forEach(n=>{
      if(n.name === node.name){
        n.marker.addTo(map);
        n.sectors.forEach(s=>coverageVisible && s.addTo(map));
      }else{
        map.removeLayer(n.marker);
        n.sectors.forEach(s=>map.removeLayer(s));
      }
    });

    map.flyTo([node.lat,node.lng],11,{animate:true,duration:1.2});
    node.marker.openPopup();

    renderSearchResult(node);

    return;
  }

  /* SEARCH USER */

  const user = usersData.find(u =>
    u.name.toUpperCase().includes(keyword)
  );

  if(user){

    const node = nodes.find(n =>
      n.name.trim().toUpperCase() ===
      user.nodeName.trim().toUpperCase()
    );

    if(node){

      /* sembunyikan node lain */
      nodes.forEach(n=>{
        if(n.name === node.name){
          n.marker.addTo(map);
          n.sectors.forEach(s=>coverageVisible && s.addTo(map));
        }else{
          map.removeLayer(n.marker);
          n.sectors.forEach(s=>map.removeLayer(s));
        }
      });

      map.flyTo([node.lat,node.lng],11,{animate:true,duration:1.2});
      node.marker.openPopup();

      renderSearchResult(node);
    }

    return;
  }

  alert("Node / User tidak ditemukan");

}
  /* ENTER SEARCH */
document
.getElementById("searchBox")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchTopology();
}
});
function backToMenu(){ window.location.href="index.html"; }

showAll();

  map.on('mousemove', function(e){
  const lat = e.latlng.lat.toFixed(6);
  const lng = e.latlng.lng.toFixed(6);

  document.getElementById('coords').innerHTML =
    `Lat: ${lat} | Lng: ${lng}`;
});
</script>

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

  authDomain: "dashboard-bwa.firebaseapp.com",
  projectId: "dashboard-bwa",
  storageBucket: "dashboard-bwa.firebasestorage.app",
  messagingSenderId: "1066238404578",
  appId: "1:1066238404578:web:ad4b911ac3f155352e3bbb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
import { collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* =============================
   LAYER KHUSUS USER & LINK
============================= */

const nodeLayer = L.layerGroup().addTo(map);
const userLayer = L.layerGroup().addTo(map);
const linkLayer = L.layerGroup().addTo(map);

window.nodesData = [];
window.usersData = [];

/* =============================
   REALTIME LOAD USERS
============================= */

onSnapshot(collection(db,"topology_users"), snapshot=>{

  usersData.length = 0;
  userLayer.clearLayers();

  snapshot.forEach(doc=>{

    const u = doc.data();
    u.id = doc.id;

    usersData.push(u);

 window.editSectorStatus = async function(docId){

    1:"#22c55e",

    4:"#f97316"
  };

  for(let i=0;i<sectorDefs.length;i++){

    const newStatus = prompt(
      `Sector ${i+1} Status (UP/OFF):`,
      currentStatus
    );
    if(!newStatus) return;

    const finalStatus = newStatus.toUpperCase();
    sectorDefs[i].status = finalStatus;

    if(finalStatus==="UP"){

      const pilih = prompt(
        "Pilih warna:\n1=Hijau\n2=Biru\n3=Kuning\n4=Oranye",
        "1"
      );

      sectorDefs[i].color = colorOptions[pilih] || "#22c55e";

    }else{
      sectorDefs[i].color = "#dc2626";
    }

    if(node.sectors && node.sectors[i]){
      node.sectors[i].setStyle({
        color: sectorDefs[i].color,
        fillColor: sectorDefs[i].color
      });
    }

  }

  const { updateDoc, doc } = await import(
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  );

  await updateDoc(doc(db,"nodes",docId),{
    sectorDefs: sectorDefs
  });

  alert("Sector berhasil diupdate!");
};

document.getElementById("csvImport").addEventListener("change", handleCSVImport);

async function handleCSVImport(event){
  const file = event.target.files[0];
  if(!file){
    alert("File tidak dipilih");
    return;
  }

  const progressBox = document.getElementById("importProgress");
  const bar = document.getElementById("progressBar");
  const text = document.getElementById("progressText");

  progressBox.style.display = "block";
  bar.style.width = "0%";
  text.innerText = "0%";

  const reader = new FileReader();

  reader.onload = async function(e){
    try{
      const csv = e.target.result.trim();
      const rows = csv.split(/\r?\n/); // support Windows/Mac/Linux

      if(rows.length < 2){
        alert("CSV kosong atau format salah");
        progressBox.style.display = "none";
        return;
      }

      const { addDoc, collection } = await import(
        "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
      );

      let success = 0;

      for(let i=1;i<rows.length;i++){  // mulai dari 1 untuk skip header
        const line = rows[i].trim();
        if(!line) continue;  // skip baris kosong

     const cols = line.split(/[\t,;]/).map(c => c.trim());

if(cols.length < 4) continue;

const name = cols[0];
const lat = parseFloat(cols[1]);
const lng = parseFloat(cols[2]);
const nodeName = cols[3];

let status = "UP";
if(cols[4]){
  status = cols[4].trim().toUpperCase();
}

const sectorName = cols[5] || "-";
let rawBw = cols[6] || "1024";
// 🔥 ambil angka saja
let bandwidth = parseInt(String(rawBw).replace(/[^\d]/g, ""));

if(isNaN(bandwidth)) bandwidth = 1024;
        
if(!name || !nodeName) continue;
if(isNaN(lat) || isNaN(lng)) continue;

await addDoc(collection(db,"topology_users"),{
  name,
  lat,
  lng,
  nodeName,
  status,
  sectorName,
  bandwidth // 🔥 TAMBAHAN
});
        success++;

        const percent = Math.round((i/(rows.length-1))*100);
        bar.style.width = percent+"%";
        text.innerText = percent+"%";
      }

      alert("Import CSV selesai: "+success+" users berhasil ditambahkan!");

    }catch(err){
      console.error(err);
      alert("Import gagal: "+err.message);
    }

    progressBox.style.display = "none";
    event.target.value = ""; // reset input agar bisa import lagi
  };

  reader.readAsText(file);
}
 window.searchTopology = function(){

  const keyword = document
  .getElementById("searchBox")
  .value
  .trim()
  .toUpperCase();

  if(!keyword) return;

  let foundUser = null;
  let foundNode = null;
  let userMatches = [];

  // =====================
  // CEK USER
  // =====================
  usersData.forEach(u=>{

    const name = (u.name || "").toUpperCase();
    const node = (u.nodeName || "").toUpperCase();

    if(
      name.includes(keyword) ||
      node.includes(keyword)
    ){
      userMatches.push(u);
    }

    if(name === keyword){
      foundUser = u;
    }

  });

  // =====================
  // CEK NODE
  // =====================
  nodes.forEach(n=>{

    const nodeName = (n.name || "").toUpperCase();

    if(nodeName === keyword){
      foundNode = n;
    }

  });

  // =====================
  // PRIORITAS 1 : USER EXACT
  // =====================
  if(foundUser){

    map.flyTo([foundUser.lat,foundUser.lng],14);

    L.popup()
    .setLatLng([foundUser.lat,foundUser.lng])
    .setContent(`<b>${foundUser.name}</b><br>Node: ${foundUser.nodeName}`)
    .openOn(map);

    return;
  }

  // =====================
  // PRIORITAS 2 : NODE
  // =====================
 if(foundNode){

  map.flyTo([foundNode.lat,foundNode.lng],12);
  foundNode.marker.openPopup();

  // 🔥 tampilkan hanya 1 node di tabel
renderSearchResult(foundNode);
  return;
}

  // =====================
  // PRIORITAS 3 : CUSTOMER / PARTIAL
  // =====================
  if(userMatches.length){

    const group = L.featureGroup();

    userMatches.forEach(u=>{

      const marker = L.circleMarker([u.lat,u.lng]);
      group.addLayer(marker);

    });

    map.fitBounds(group.getBounds());

    alert(userMatches.length + " user ditemukan");

    return;
  }

  alert("Data tidak ditemukan");

}
