/* ================= RULER (FINAL BENAR) ================= */
let rulerActive=false;
let rulerPoints=[]; let rulerLine=null; let rulerMarkers=[]; let rulerLabel=null;

function activateRuler(){ resetRuler(); rulerActive=true; map.getContainer().style.cursor='crosshair'; }
function resetRuler(){ rulerActive=false; rulerPoints=[]; if(rulerLine) map.removeLayer(rulerLine); rulerMarkers.forEach(m=>map.removeLayer(m)); if(rulerLabel) map.removeLayer(rulerLabel); rulerLine=null; rulerMarkers=[]; rulerLabel=null; map.getContainer().style.cursor=''; }
function calculateAzimuth(p1,p2){ const lat1=p1.lat*Math.PI/180; const lat2=p2.lat*Math.PI/180; const dLon=(p2.lng-p1.lng)*Math.PI/180; const y=Math.sin(dLon)*Math.cos(lat2); const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon); return (Math.atan2(y,x)*180/Math.PI+360)%360; }
function addRulerPoint(latlng){
  if(rulerPoints.length>=2) return;
  rulerPoints.push(latlng);
  const m=L.marker(latlng,{draggable:true,icon:L.divIcon({className:'',iconSize:[12,12],html:'<div style="width:12px;height:12px;border-radius:50%;background:#facc15"></div>'})}).addTo(map);
  m.on('drag',()=>{ rulerPoints[rulerMarkers.indexOf(m)]=m.getLatLng(); rulerLine.setLatLngs(rulerPoints); const d=map.distance(rulerPoints[0],rulerPoints[1])/1000; const az=calculateAzimuth(rulerPoints[0],rulerPoints[1]); const mid=[(rulerPoints[0].lat+rulerPoints[1].lat)/2,(rulerPoints[0].lng+rulerPoints[1].lng)/2]; rulerLabel.setLatLng(mid).setContent(`<b>${d.toFixed(2)} km<br>Azimuth: ${az.toFixed(1)}°</b>`); });
  rulerMarkers.push(m);
  if(rulerPoints.length===2){
    rulerLine=L.polyline(rulerPoints,{color:'#facc15',weight:3}).addTo(map);
    const d=map.distance(rulerPoints[0],rulerPoints[1])/1000;
    const az=calculateAzimuth(rulerPoints[0],rulerPoints[1]);
    const mid=[(rulerPoints[0].lat+rulerPoints[1].lat)/2,(rulerPoints[0].lng+rulerPoints[1].lng)/2];
    rulerLabel=L.tooltip({permanent:true,direction:'center',className:'ruler-label'}).setLatLng(mid).setContent(`<b>${d.toFixed(2)} km<br>Azimuth: ${az.toFixed(1)}°</b>`).addTo(map);
    rulerActive=false; map.getContainer().style.cursor='';
  }
}
map.on('click',e=>{if(rulerActive) addRulerPoint(e.latlng);});

/* ================= NODE ICON ================= */
function icon(colors,fast=false){ return L.divIcon({className:`node-blink ${fast?'fast':''}`,iconSize:[36,36],iconAnchor:[18,18],html:`<svg width="36" height="36" viewBox="0 0 100 100"><path d="M50 50 L50 0 A50 50 0 0 1 100 50 Z" fill="${colors[0]}"/><path d="M50 50 L100 50 A50 50 0 0 1 50 100 Z" fill="${colors[1]}"/><path d="M50 50 L50 100 A50 50 0 0 1 0 50 Z" fill="${colors[2]}"/><path d="M50 50 L0 50 A50 50 0 0 1 50 0 Z" fill="${colors[3]}"/><circle cx="50" cy="50" r="9" fill="#020617" stroke="white" stroke-width="2"/></svg>`});}

/* ================= SECTOR ================= */
function createSector(center, radius, startAz, endAz, opt){

  const pts = [center];

  // normalisasi
  startAz = ((startAz % 360) + 360) % 360;
  endAz   = ((endAz % 360) + 360) % 360;

  let az = startAz;

  while(true){

    const rad = az * Math.PI / 180;

    const lat = center.lat + (radius * Math.cos(rad)) / 111320;
    const lng = center.lng + (radius * Math.sin(rad)) /
      (111320 * Math.cos(center.lat * Math.PI / 180));

    pts.push([lat, lng]);

    if(az === endAz) break;

    az = (az + 2) % 360;   // 🔥 WRAP OTOMATIS
  }

  pts.push(center);

  return L.polygon(pts, opt);
}

/* ================= CREATE NODE ================= */
nodes.forEach(n=>{
  const col = n.status==='UP'
    ? ['#2563eb','#22c55e','#2563eb','#22c55e']
    : ['#dc2626','#f97316','#dc2626','#f97316'];

  n.marker = L.marker([n.lat,n.lng],{
    icon:icon(col,n.status==='DOWN')
  }).addTo(map)
  .bindPopup(`
  <b>${n.name}</b><br>
  Area: ${n.region}<br>
  Status: ${n.status}
`);
  n.marker.on('click',e=>{
    if(rulerActive){
      addRulerPoint(e.latlng);
      L.DomEvent.stopPropagation(e);
    }
  });

  n.sectors = [];

  /* ===== JIKA ADA sectorDefs → PAKAI ITU ===== */
  if(n.sectorDefs){
    n.sectorDefs.forEach((sec,idx)=>{
      const c = col[idx % col.length];
      const s = createSector(
        L.latLng(n.lat,n.lng),
        5000,
        sec.start,
        sec.end,
        {
          color:c,
          fillColor:c,
          fillOpacity:.25,
          weight:1,
          interactive:false
        }
      ).addTo(map);
      n.sectors.push(s);
    });

  /* ===== JIKA TIDAK ADA → DEFAULT 4 SEKTOR ===== */
  }else{
    for(let i=0;i<4;i++){
      const s = createSector(
        L.latLng(n.lat,n.lng),
        5000,
        i*90,
        (i+1)*90,
        {
          color:col[i],
          fillColor:col[i],
          fillOpacity:.25,
          weight:1,
          interactive:false
        }
      ).addTo(map);
      n.sectors.push(s);
    }
  }
});


/* ================= TABLE & FILTER ================= */
function render(list){ const tb=document.getElementById('node-table'); tb.innerHTML=''; list.forEach(n=>{ tb.innerHTML+=`<tr onclick="focusNode('${n.name}')" style="cursor:pointer"><td>${n.name}</td><td>${n.region}</td><td class="${n.status==='UP'?'up':'down'}">${n.status}</td></tr>`; }); }
function focusNode(name){ const n=nodes.find(x=>x.name===name); map.flyTo([n.lat,n.lng],11,{animate:true,duration:1.2}); n.marker.openPopup(); }
function showAll(){ render(nodes); nodes.forEach(n=>{ n.marker.addTo(map); n.sectors.forEach(s=>coverageVisible&&s.addTo(map)); }); }
function filterRegion(r){ render(nodes.filter(n=>n.region===r)); nodes.forEach(n=>{ if(n.region===r){ n.marker.addTo(map); n.sectors.forEach(s=>coverageVisible&&s.addTo(map)); }else{ map.removeLayer(n.marker); n.sectors.forEach(s=>map.removeLayer(s)); } }); }
function toggleCoverage(){ coverageVisible=!coverageVisible; nodes.forEach(n=>n.sectors.forEach(s=>{ coverageVisible?s.addTo(map):map.removeLayer(s); })); }
function toggleTable(){ document.getElementById('node-section').classList.toggle('hidden'); }
function backToMenu(){ window.location.href="index.html"; }

  const name = prompt("Masukkan nama NODE (contoh: TGRNEW01)");
  if(!name) return;

  const region = prompt("Masukkan region (contoh: BWA / EJA / CJDA)");

    );

   // jumlah sektor
const sectorCount = parseInt(prompt("Jumlah sektor? (1-4)", "1"));
if(!sectorCount || sectorCount < 1 || sectorCount > 4){
  alert("Jumlah sektor harus 1 sampai 4");
  return;
}

let sectorDefs = [];

for(let i=0;i<sectorCount;i++){

  let azimuth = parseInt(
    prompt(`Masukkan azimuth sektor ${i+1} (contoh 135)`)
  );

  if(isNaN(azimuth)){
    alert("Azimuth tidak valid");
    return;
  }

  // ✅ NORMALISASI supaya selalu 0–359
  azimuth = ((azimuth % 360) + 360) % 360;

  const beamwidth = 90;   // 🔥 FIX 90 DERJAT

  let start = azimuth - (beamwidth/2);
  let end   = azimuth + (beamwidth/2);

  // ✅ normalisasi start & end
  start = ((start % 360) + 360) % 360;
  end   = ((end % 360) + 360) % 360;

  sectorDefs.push({
    start: start,
    end: end
  });
}

await addDoc(collection(db,"nodes"),{
  name:name,
  region:region,
  lat:lat,
  lng:lng,
  status:"UP",
  sectorDefs:sectorDefs
});
    alert("NODE berhasil ditambahkan!");
  }catch(err){
    console.error(err);
    alert("Gagal menambahkan node");
  }
});
    /* =============================
   REALTIME LOAD NODE BARU
============================= */

onSnapshot(collection(db,"nodes"), snapshot=>{

  nodes.length = 0;          // reset array
  nodeLayer.clearLayers();   // reset layer

  snapshot.forEach(doc=>{

    const n = doc.data();
    n.id = doc.id;

    nodes.push(n);

    const col = n.status === "OFF"
      ? ['#dc2626','#f97316','#dc2626','#f97316']
      : ['#2563eb','#22c55e','#2563eb','#22c55e'];

    const marker = L.marker([n.lat,n.lng],{
      icon:icon(col, n.status === "OFF")
    }).addTo(nodeLayer)
    .bindPopup(`
  <b>${n.name}</b><br>
  Area: ${n.region}<br>
  Status: ${n.status}<br><br>

  <button onclick="editFullNode('${doc.id}')"
  style="background:#2563eb;color:white;border:none;padding:4px 8px;border-radius:6px;margin-bottom:4px;">
  Edit Node
  </button><br>

  <button onclick="editNodeStatus('${doc.id}','${n.status}')"
  style="background:orange;color:white;border:none;padding:4px 8px;border-radius:6px;margin-bottom:4px;">
  Ubah Status
  </button><br>

  <button onclick="deleteNode('${doc.id}')"
  style="background:red;color:white;border:none;padding:4px 8px;border-radius:6px;">
  Delete Node
  </button>
`);
    n.marker = marker;
    n.sectors = [];

    if(n.sectorDefs){
      n.sectorDefs.forEach((sec,idx)=>{
        const c = col[idx % col.length];

        const s = createSector(
          L.latLng(n.lat,n.lng),
          5000,
          sec.start,
          sec.end,
          {
            color:c,
            fillColor:c,
            fillOpacity:.25,
            weight:1,
            interactive:false
          }
        ).addTo(nodeLayer);

        n.sectors.push(s);
      });
    }

  });

  render(nodes);
  redrawLinks();

});

function redrawLinks(){

  linkLayer.clearLayers();

  usersData.forEach(u=>{   // 🔥 PAKAI usersData

    const node = nodes.find(n => n.name === u.nodeName);

    if(!node) return;

    const line = L.polyline(
      [
        [u.lat, u.lng],
        [node.lat, node.lng]
      ],
      {
        color: "#facc15",
        weight: 2,
        opacity: 0.9,
        dashArray:"4"
      }
    );
    linkLayer.addLayer(line);
  });
}
    
function refreshMap(){

  // Clear semua layer
  linkLayer.clearLayers();
  userLayer.clearLayers();

  // Re-render table & marker
  render(nodes);

  // Gambar ulang link
  redrawLinks();

  alert("✅ Topology telah berhasil di-refresh");

}
    window.editFullNode = async function(docId){

  const node = nodes.find(n => n.id === docId);
  if(!node) return;

  const newName = prompt("Nama Node:", node.name);
  if(!newName) return;

  const newRegion = prompt("Region:", node.region);
  if(!newRegion) return;

  const sectorCount = parseInt(prompt("Jumlah sektor?", node.sectorDefs?.length || 1));

  if(!sectorCount || sectorCount < 1 || sectorCount > 4){
    alert("Jumlah sektor 1-4");
    return;
  }

  let sectorDefs = [];

  for(let i=0;i<sectorCount;i++){

    let azimuth = parseInt(prompt(`Azimuth sektor ${i+1}`));

    azimuth = ((azimuth % 360) + 360) % 360;

    const beamwidth = 90;

    let start = azimuth - (beamwidth/2);
    let end   = azimuth + (beamwidth/2);

    start = ((start % 360) + 360) % 360;
    end   = ((end % 360) + 360) % 360;

    sectorDefs.push({ start, end });
  }

  const { updateDoc, doc } = await import(
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  );

  await updateDoc(doc(db,"nodes",docId),{
    name:newName,
    region:newRegion,
    sectorDefs:sectorDefs
  });

  alert("Node berhasil diupdate!");
};
