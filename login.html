<h2>Login Topology</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="loginUser()">Login</button>
<div id="msg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { /* config kamu */ };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.loginUser = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    // ambil role
    const docRef = doc(db, "users_roles", uid);
    const snapshot = await getDoc(docRef);
    if(snapshot.exists()){
      const role = snapshot.data().role;
      localStorage.setItem("userRole", role);
      localStorage.setItem("userName", snapshot.data().name);
      window.location.href = "topology.html"; // redirect ke map
    } else {
      document.getElementById("msg").innerText = "Role tidak ditemukan!";
    }

  } catch(err) {
    document.getElementById("msg").innerText = err.message;
  }
};
</script>
